<div class="register-container">
  <div class="register-card">
    <h2>Créer un compte</h2>
    <p class="subtitle">Rejoignez la plateforme de quiz de votre équipe</p>

    <form (ngSubmit)="onSubmit()">
      
      <div class="form-group">
        <label for="username">Nom d'utilisateur</label>
        <input 
          type="text" 
          id="username"
          [(ngModel)]="username" 
          name="username" 
          placeholder="Ex: Meïssa"
          required>
      </div>

      <div class="form-group">
        <label for="email">Adresse Email</label>
        <input 
          type="email" 
          id="email"
          [(ngModel)]="email" 
          name="email" 
          placeholder="votre.email@exemple.com"
          required>
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input 
          type="password" 
          id="password"
          [(ngModel)]="password" 
          name="password" 
          placeholder="Créer un mot de passe"
          required>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmer le mot de passe</label>
        <input 
          type="password" 
          id="confirmPassword"
          [(ngModel)]="confirmPassword" 
          name="confirmPassword" 
          placeholder="Répéter le mot de passe"
          required>
        
        <p *ngIf="password && confirmPassword && password !== confirmPassword" class="error-message">
          ⚠️ Les mots de passe ne correspondent pas.
        </p>
      </div>

      <button 
        type="submit" 
        [disabled]="!username || !email || !password || password !== confirmPassword"
        class="btn-submit">
        S'inscrire
      </button>

      <div class="forgot-password-link">
        <a routerLink="/forgot-password">Mot de passe oublié ?</a>
      </div>

    </form>
  </div>
</div>
