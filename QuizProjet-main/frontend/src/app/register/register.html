<div class="register-container">
  <h2>Créer un compte</h2>
  
  <form #registerForm="ngForm" (ngSubmit)="onSubmit()">
    
    <!-- Champ Nom complet -->
    <div class="form-group">
      <label for="fullName">Nom complet</label>
      <input 
        type="text" 
        id="fullName" 
        [(ngModel)]="user.fullName" 
        name="fullName" 
        class="form-control" 
        placeholder="Entrez votre nom complet" 
        required>
    </div>

    <!-- Champ Email -->
    <div class="form-group">
      <label for="email">Adresse email</label>
      <input 
        type="email" 
        id="email" 
        [(ngModel)]="user.email" 
        name="email" 
        class="form-control" 
        placeholder="exemple@domaine.com" 
        required>
    </div>

    <!-- Champ Mot de passe -->
    <div class="form-group">
      <label for="password">Mot de passe</label>
      <input 
        type="password" 
        id="password" 
        [(ngModel)]="user.password" 
        name="password" 
        class="form-control" 
        placeholder="Créez un mot de passe sécurisé" 
        required>
    </div>

    <!-- SÉLECTION DU RÔLE (ÉTUDIANT OU ÉVALUATEUR) -->
    <div class="form-group">
      <label for="role">Je m'inscris en tant que :</label>
      <select 
        id="role" 
        [(ngModel)]="user.role" 
        name="role" 
        class="form-control" 
        required>
        <option value="STUDENT">Étudiant</option>
        <option value="EVALUATOR">Évaluateur (Enseignant)</option>
      </select>
    </div>

    <!-- Bouton de validation -->
    <button type="submit" [disabled]="!registerForm.form.valid" class="btn-submit">
      S'inscrire
    </button>

  </form>
</div>
