        <tr>
          <td><strong>Meïssa Diop</strong></td>
          <td>meissa.diop&#64;isi.sn</td>

            <button class="btn-action block-btn" title="Bloquer le compte">🔒 Bloquer</button>
          </td>
        </tr>
        <tr>
          <td><strong>Amadou Diallo</strong></td>
          <td>amadou.diallo&#64;isi.sn</td>

          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
